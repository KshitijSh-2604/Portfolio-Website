<!DOCTYPE html>
<html>
<head>
  <base href="/Portfolio-Website/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kshitij Sharma — SDE / Flutter Developer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kshitij Sharma">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Kshitij Sharma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      background-color: #0A0A14;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #0A0A14;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #loading .icon-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
    }
    #loading .icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: breathe 3s ease-in-out infinite;
      z-index: 2;
      position: relative;
    }
    #loading .glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(124, 77, 255, 0.2) 0%, transparent 70%);
      animation: pulse-glow 3s ease-in-out infinite;
      z-index: 1;
    }
    #loading .text-container {
      text-align: center;
    }
    #loading .name {
      color: white;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 0;
      opacity: 0;
      transform: translateY(10px);
      animation: fade-up 0.8s ease-out forwards 0.5s;
    }
    #loading .role {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0;
      animation: fade-in 1s ease-out forwards 1.2s;
    }
    #loading .loader-bar {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      margin-top: 40px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    #loading .loader-progress {
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #7C4DFF, transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(124, 77, 255, 0)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(124, 77, 255, 0.3)); }
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }
    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
    @keyframes shimmer {
      to { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon-container">
      <div class="glow"></div>
      <img src="favicon.png" class="icon" alt="K">
    </div>
    <div class="text-container">
      <h1 class="name">Kshitij Sharma</h1>
      <div class="role">SDE / Flutter Developer</div>
    </div>
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
